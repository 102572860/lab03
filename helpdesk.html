<body>
    <img src="./logo.png" alt="a logo of sweinburne">

    <main>
        <h1> CWA Help Desk Appointment </h1>
        <p> The Help Desk is located  in ATC620. Open 10:30 to 19:00 Monday to Friday</p>
        <p>Check Blackboard for when CWA tutors will be there.</p>
        <form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
            <fieldset>
            <legend>Student details</legend>
             <p><label for="student_id" >Student ID </label></p>
             <input type="text" name="student_id" id="student_id" required="required">
            <p><label for="f_name">Given Name</label>
            <input type="text" name="f_name" id="f_name" pattern="[a-zA-Z]" required="required">
            <label for="l_name">Last Name</label>
            <input type="text" name="l_name" id="l_name" pattern="[a-zA-Z]" required="required"></p>
            </fieldset>
             <fieldset>
                <legend>Your Unit</legend>
               <p> <label for="COS10011">COS10011</label> 
                <input type="radio" name="unit" id="COS10011" value="COS10011" required="required">
            
                <label for="COS60004">COS60004</label> 
                <input type="radio" name="unit" id="COS60004" value="COS60004">
            
                <label for="COS60007">COS60007</label> 
                 <input type="radio" name="unit" id="COS60007" value="COS60007">
             </p>
             <label for="tutor">Your Tutor
                <select name="tutor" id="tutor" required="required">
                   <option value="">Please Select</option>
                   <option value="Rahul">Rahul (best)</option> 
                   <option value="Atie">Atie</option> 
                   <option value="Nick">Nick</option> 
                   <option value="Razeen">Razeen</option> 
                </select>
             </label>
             </fieldset>
             <fieldset> 
                <legend>Issue 1</legend>
                <label for="html">HTML</label> 
				<input type="checkbox" id="HTML" name="category[]" value="HTML" checked="checked"/>
			
                <label for="CSS">CSS</label> 
				<input type="checkbox" id="CSS" name="category[]" value="CSS" />
			
                <label for="JS">JavaScript</label> 
				<input type="checkbox" id="JS" name="category[]" value="JS" />
			
                <label for="PHP">PHP</label> 
				<input type="checkbox" id="PHP" name="category[]" value="PHP" />
			
                <label for="SQL">MySQL</label> 
				<input type="checkbox" id="SQL" name="category[]" value="SQL" />
			</p>
                <p><label for="comments">Description of issue</label>
			<textarea id="comments" name="comments" rows="4" cols="40" placeholder="Write a description of your problems here:"></textarea>
		</p>
             </fieldset>
           <fieldset>
            <legend>Preferred Date/Time</legend>
            <p><label for="date"></label></fieldset>
            <input type="date" name="date" id="date"></p>
           </fieldset>

        </form>
